name: PR Checks

# Originally used pull_request_target so fork PRs get secrets and OIDC access.
# Workflow YAML is always sourced from the default branch (main) with that trigger.
# All checkout steps explicitly reference the PR head SHA.
#
# Security: this is a private repo. Gate 1 (Settings → Actions → General)
# requires approval for fork PRs from users without write access.
#
# Switched to `pull_request` so PRs can test their own workflow changes.
# E2E jobs additionally check github.event.pull_request.head.repo.full_name
# to skip for fork PRs (defense in depth — pull_request already blocks secrets).
# TODO: Verify with AppSec before making this repo public.

on:
  pull_request:
    branches: ['*']

# One run per PR. When a new commit is pushed, any still-running run for the
# same PR is cancelled. Prevents two concurrent `cdk deploy` invocations from
# racing on the same PR-scoped stack, which can leave a partial rollback
# wedged in DELETE_FAILED and block every later run until the stack is
# manually cleaned up in AWS.
concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  # Use the 'spec' reporter for node:test — produces a clean, hierarchical
  # pass/fail summary instead of verbose TAP output with per-test YAML blocks.
  NODE_OPTIONS: '--test-reporter=spec'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      source-changed: ${{ steps.check.outputs.source-changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - id: check
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '^(packages|test-apps)/'; then
            echo "source-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "source-changed=false" >> "$GITHUB_OUTPUT"
          fi

  blocks-integrity:
    name: Blocks Package Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Sync block docs (prebuild step)
        run: node scripts/sync-block-docs.mjs

      - name: Check blocks docs-sync integrity
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          # sync-block-docs.mjs regenerates packages/blocks/docs/ from sibling READMEs
          # (docs/ is gitignored, built at publish time). We compare the packed
          # @aws-blocks/blocks tarball at THIS PR's head against the PR base branch —
          # like-for-like (same algo, same build state), so only a change introduced by
          # THIS PR trips the check. A PR that doesn't alter what ships needs no bump.
          pack_blocks() {
            local dest="$1"
            node scripts/sync-block-docs.mjs >/dev/null
            # --ignore-scripts intentionally packs source + synced docs, NOT a freshly built dist/ — this diffs shipped content, not the published build.
            ( cd packages/blocks && npm pack --ignore-scripts --pack-destination "$dest" >/dev/null )
            set -- "$dest"/*.tgz
            [ $# -eq 1 ] || { echo "expected exactly one .tgz in $dest, found $#" >&2; exit 1; }
            shasum -a 512 "$1" | awk '{print $1}'
          }

          mkdir -p /tmp/head-pack
          HEAD_INTEGRITY=$(pack_blocks /tmp/head-pack)

          # BASE_SHA is present locally (checkout uses fetch-depth: 0).
          git worktree add --detach /tmp/blocks-base "$BASE_SHA" >/dev/null
          mkdir -p /tmp/base-pack
          BASE_INTEGRITY=$(
            cd /tmp/blocks-base
            node scripts/sync-block-docs.mjs >/dev/null
            ( cd packages/blocks && npm pack --ignore-scripts --pack-destination /tmp/base-pack >/dev/null )
            set -- /tmp/base-pack/*.tgz
            [ $# -eq 1 ] || { echo "expected exactly one .tgz in /tmp/base-pack, found $#" >&2; exit 1; }
            shasum -a 512 "$1" | awk '{print $1}'
          )
          git worktree remove --force /tmp/blocks-base

          echo "Head packed shasum: $HEAD_INTEGRITY"
          echo "Base packed shasum: $BASE_INTEGRITY"

          # Relies on npm's reproducible packing (fixed mtimes); head & base pack on the same runner, so identical content ⇒ identical tarball hash.
          if [ "$HEAD_INTEGRITY" = "$BASE_INTEGRITY" ]; then
            echo "✅ @aws-blocks/blocks packaged content is unchanged vs the base branch — no version bump required."
            exit 0
          fi

          # Content changed vs base — require a changeset that bumps @aws-blocks/blocks.
          CHANGESET_BUMPS=$(find .changeset -name '*.md' ! -name 'README.md' -exec grep -l '"@aws-blocks/blocks"' {} \; || true)

          if [ -n "$CHANGESET_BUMPS" ]; then
            echo "✅ Packaged content changed and a changeset already bumps @aws-blocks/blocks:"
            echo "$CHANGESET_BUMPS"
            exit 0
          fi

          echo "❌ This PR changes @aws-blocks/blocks packaged content (e.g. synced docs from sibling READMEs) vs the base branch, but no changeset bumps it. Add \"@aws-blocks/blocks\": patch to a changeset."
          exit 1

  build-and-test-local:
    name: Build, Unit Tests, E2E Local
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin a fixed Blocks CLI telemetry installation ID for CI e2e runs so this
      # traffic is consistent and identifiable (and can be excluded from product
      # usage metrics).
      - uses: ./.github/actions/seed-telemetry-id

      - run: npm ci

      - name: Lint (advisory — annotations only, non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Lint deps (blocking)
        run: npm run lint:deps

      - name: Build
        run: npm run build

      - name: Check aws-blocks exports consistency
        run: npm run check:exports-consistency

      - name: Check API backward compatibility
        run: npm run check:api

      - name: Unit Tests
        run: npm run test:unit

      - name: E2E Test Local
        run: npm run test:e2e:local

      - name: Pack for local registry
        run: npm run publish:dry-run

      - name: Upload registry artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist-registry
          path: dist-registry/
          retention-days: 1

  e2e-templates:
    name: E2E Templates
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin a fixed Blocks CLI telemetry installation ID for CI e2e runs so this
      # traffic is consistent and identifiable (and can be excluded from product
      # usage metrics).
      - uses: ./.github/actions/seed-telemetry-id

      - run: npm ci

      - name: Download registry artifact
        uses: actions/download-artifact@v5
        with:
          name: dist-registry
          path: dist-registry/

      - name: Template E2E Tests
        run: bash scripts/test-templates-e2e.sh --skip-publish

  e2e-sandbox:
    name: E2E Sandbox
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: publish
    env:
      BLOCKS_STACK_SUFFIX: pr-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin a fixed Blocks CLI telemetry installation ID for CI e2e runs so this
      # traffic is consistent and identifiable (and can be excluded from product
      # usage metrics).
      - uses: ./.github/actions/seed-telemetry-id

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: E2E Test Sandbox
        run: npm run test:e2e:sandbox

  e2e-sandbox-vpc:
    name: E2E Sandbox (VPC Smoke)
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: publish
    env:
      BLOCKS_STACK_SUFFIX: vpc-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin a fixed Blocks CLI telemetry installation ID for CI e2e runs so this
      # traffic is consistent and identifiable (and can be excluded from product
      # usage metrics).
      - uses: ./.github/actions/seed-telemetry-id

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: E2E Test Sandbox (VPC Smoke)
        run: npm run test:e2e:sandbox:vpc

  e2e-production:
    name: E2E Production
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: publish
    env:
      BLOCKS_STACK_SUFFIX: pr-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin a fixed Blocks CLI telemetry installation ID for CI e2e runs so this
      # traffic is consistent and identifiable (and can be excluded from product
      # usage metrics).
      - uses: ./.github/actions/seed-telemetry-id

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: E2E Test Production
        run: npm run test:e2e:production

  e2e-supabase:
    name: E2E Supabase
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: publish
    env:
      # Pin the Supabase Root 2021 CA (public cert, committed) so every external-DB
      # connection in this suite runs verify-full — exercising the TLS verification
      # feature end-to-end instead of connecting unverified. externalDbSsl() reads
      # this; the explicit-engine tests read it too.
      DATABASE_CA_CERT: ${{ github.workspace }}/packages/bb-data/test/fixtures/supabase-ca.crt
    concurrency:
      group: e2e-supabase
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin a fixed Blocks CLI telemetry installation ID for CI e2e runs so this
      # traffic is consistent and identifiable (and can be excluded from product
      # usage metrics).
      - uses: ./.github/actions/seed-telemetry-id

      - run: npm ci
      - run: npm run build

      - name: Install pg_dump 18 (for the run-all baseline E2E)
        # The runner's default pg_dump may be older than the Supabase server, and
        # pg_dump's major must be >= the server's. Install the PGDG client so the
        # run-all baseline E2E (migrations-e2e) generates a real baseline instead of
        # skipping. Applying migrations needs no pg_dump — only generating one does.
        # Best-effort (continue-on-error): if the install ever fails, the gated E2E
        # just skips — it must not take down the crud/auth Supabase suites. Uses the
        # armored key via apt `signed-by` directly (no `gpg --dearmor`, which fails
        # on `/dev/tty` under sudo in CI).
        continue-on-error: true
        run: |
          sudo install -d /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /etc/apt/keyrings/pgdg.asc > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/pgdg.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch Supabase secrets
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id blocks/supabase-e2e \
            --query SecretString --output text)
          echo "$SECRET" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Apply test schema
        run: npx tsx packages/bb-data/test/apply-schema.ts

      - name: E2E Test Supabase
        run: npm run test:e2e:supabase

  e2e-hosting:
    name: E2E Hosting (${{ matrix.framework }})
    timeout-minutes: 60
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - framework: spa
            app-dir: test-apps/hosting-spa
            script: test:e2e:hosting-spa
          - framework: nextjs
            app-dir: test-apps/hosting-ssr
            script: test:e2e:hosting-ssr
          - framework: nuxt
            app-dir: test-apps/hosting-ssr-nuxt
            script: test:e2e:hosting-ssr-nuxt
          - framework: astro
            app-dir: test-apps/hosting-ssr-astro
            script: test:e2e:hosting-ssr-astro
          - framework: astro-default404
            app-dir: test-apps/hosting-ssr-astro-default404
            script: test:e2e:hosting-ssr-astro-default404
    env:
      BLOCKS_STACK_SUFFIX: pr-${{ github.event.pull_request.number || github.run_id }}-${{ matrix.framework }}
      E2E_FROM_EMAIL: ${{ secrets.E2E_FROM_EMAIL }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin a fixed Blocks CLI telemetry installation ID for CI e2e runs so this
      # traffic is consistent and identifiable (and can be excluded from product
      # usage metrics).
      - uses: ./.github/actions/seed-telemetry-id

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E Test Hosting (${{ matrix.framework }})
        run: npm run ${{ matrix.script }}

      - name: Cleanup sandbox
        if: always()
        run: |
          cd ${{ matrix.app-dir }}
          npx tsx test/sandbox-destroy.ts aws-blocks/index.cdk.ts || true

  e2e-telemetry:
    name: Telemetry E2E
    needs: [build-and-test-local, detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: publish
    permissions:
      contents: read
      id-token: write
    env:
      BLOCKS_STACK_SUFFIX: telemetry-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Seed fixed e2e telemetry installation ID
        shell: bash
        run: |
          mkdir -p "$HOME/.blocks/telemetry"
          printf '%s' '00000000-0000-0000-0000-000000000e2e' > "$HOME/.blocks/telemetry/installation-id"

      - name: Telemetry E2E Tests
        run: npm run test:telemetry

      - name: Cleanup stacks
        if: always()
        run: |
          cd test-apps/telemetry
          npx tsx aws-blocks/scripts/sandbox-destroy.ts || true
          npx tsx aws-blocks/scripts/destroy.ts || true

  # Gate job — matches the branch protection required check name.
  # Skipped E2E jobs (no source changes) are treated as passing.
  # Note: Amplify interop tests live in a separate workflow
  # (e2e-amplify-interop.yml) so their failures don't show red here.
  build-and-test:
    name: Build and Test
    needs: [blocks-integrity, build-and-test-local, e2e-templates, e2e-sandbox, e2e-sandbox-vpc, e2e-production, e2e-supabase, e2e-hosting, e2e-telemetry]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.blocks-integrity.result }}" != "success" ]]; then
            echo "blocks-integrity failed"
            exit 1
          fi

          if [[ "${{ needs.build-and-test-local.result }}" != "success" ]]; then
            echo "build-and-test-local failed"
            exit 1
          fi

          # E2E jobs must either succeed or be skipped (no source changes)
          if [[ "${{ needs.e2e-templates.result }}" != "success" && "${{ needs.e2e-templates.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-sandbox.result }}" != "success" && "${{ needs.e2e-sandbox.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-sandbox-vpc.result }}" != "success" && "${{ needs.e2e-sandbox-vpc.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-production.result }}" != "success" && "${{ needs.e2e-production.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-supabase.result }}" != "success" && "${{ needs.e2e-supabase.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-hosting.result }}" != "success" && "${{ needs.e2e-hosting.result }}" != "skipped" ]] ||
             [[ "${{ needs.e2e-telemetry.result }}" != "success" && "${{ needs.e2e-telemetry.result }}" != "skipped" ]]; then
            echo "One or more E2E jobs failed"
            exit 1
          fi
