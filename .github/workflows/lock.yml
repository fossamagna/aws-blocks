name: Lock Threads
on:
  schedule:
    - cron: '30 1 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2
        with:
          issue-inactive-days: '365'
          issue-lock-reason: 'resolved'
          pr-inactive-days: '365'
          pr-lock-reason: 'resolved'
