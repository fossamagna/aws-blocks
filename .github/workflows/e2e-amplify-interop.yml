name: E2E Amplify Interop

# Runs Amplify interop tests on PRs as a required, blocking check.
# A failure here fails the PR — Blocks must stay compatible with the
# Amplify Gen2 integration path.

on:
  pull_request:
    branches: ['*']

concurrency:
  group: e2e-amplify-interop-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  NODE_OPTIONS: '--test-reporter=spec'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      source-changed: ${{ steps.check.outputs.source-changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - id: check
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '^(packages|test-apps|scripts)/|^\.github/workflows/e2e-amplify-interop\.yml$'; then
            echo "source-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "source-changed=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-amplify-interop-smoke:
    name: E2E Amplify Interop (Smoke)
    timeout-minutes: 30
    needs: [detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin a fixed Blocks CLI telemetry installation ID for CI e2e runs so this
      # traffic is consistent and identifiable (and can be excluded from product
      # usage metrics).
      - uses: ./.github/actions/seed-telemetry-id

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Scaffold Amplify + Blocks app
        run: |
          mkdir -p /tmp/amplify-interop-test
          cd /tmp/amplify-interop-test
          npm create amplify@latest -- --yes
          node $GITHUB_WORKSPACE/packages/create-blocks-app/dist/index.js --yes .

      # De-skew the sandbox typecheck against the drifting Amplify scaffold.
      #
      # `npm create amplify@latest` installs its OWN aws-cdk-lib/constructs at
      # whatever versions it currently ships, which drift from the versions this
      # repo builds against. The generated aws-blocks/index.cdk.ts resolves
      # aws-cdk-lib (Stack/Mixins) from THIS scaffold's tree, while the Blocks
      # packages — linked in as `file:` deps (symlinks) — resolve their own
      # constructs/aws-cdk-lib from the REPO's tree via the symlink realpath.
      # tsc dedups modules by package id (name@version), so when the two trees
      # are DIFFERENT versions it treats them as distinct declarations and the
      # nominally-private Construct#host member no longer matches — failing with
      # TS2345 "separate declarations of a private property 'host'".
      #
      # Fix: pin the scaffold's constructs/aws-cdk-lib to the repo's EXACT
      # installed versions (read from node_modules, not the package.json semver
      # range, so the ids match precisely — a range could resolve to a newer
      # patch and re-drift). The scaffold lists both as DIRECT devDependencies,
      # and npm refuses an `overrides` entry for a directly-depended package
      # unless the direct spec matches the override exactly (EOVERRIDE) — so pin
      # the direct dep specs to those same exact versions AND set the overrides
      # (the latter also dedupes any transitive copies), then reinstall. Matching
      # versions => matching package ids => tsc dedups to one declaration.
      - name: Pin constructs/aws-cdk-lib to the repo's versions
        run: |
          cd /tmp/amplify-interop-test
          node -e '
            const fs = require("fs");
            const ws = process.env.GITHUB_WORKSPACE;
            const ver = (n) => {
              try { return require(ws + "/node_modules/" + n + "/package.json").version; }
              catch { const p = require(ws + "/package.json"); return (p.devDependencies || {})[n] || (p.dependencies || {})[n]; }
            };
            const constructsV = ver("constructs"), cdkV = ver("aws-cdk-lib");
            if (!constructsV || !cdkV) throw new Error("could not determine constructs/aws-cdk-lib version from repo");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const pins = { constructs: constructsV, "aws-cdk-lib": cdkV };
            for (const [name, v] of Object.entries(pins)) {
              for (const bucket of ["dependencies", "devDependencies"]) {
                if (pkg[bucket] && pkg[bucket][name]) pkg[bucket][name] = v;
              }
            }
            pkg.overrides = { ...pkg.overrides, ...pins };
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
            console.log("pinned constructs=" + constructsV + " aws-cdk-lib=" + cdkV + " (direct deps + overrides)");
          '
          rm -rf node_modules package-lock.json
          npm install

      - name: Deploy sandbox
        run: |
          cd /tmp/amplify-interop-test
          npm run sandbox -- --once --identifier int-${GITHUB_RUN_ID:(-8)}

      - name: Smoke test
        run: |
          cd /tmp/amplify-interop-test
          node $GITHUB_WORKSPACE/scripts/smoke-test-amplify-interop.mjs

      - name: Cleanup sandbox
        if: always()
        run: |
          cd /tmp/amplify-interop-test
          npm run sandbox:delete -- --identifier int-${GITHUB_RUN_ID:(-8)} || true

  e2e-amplify-interop:
    name: E2E Amplify Interop (Browser)
    timeout-minutes: 30
    needs: [detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: publish
    env:
      BLOCKS_STACK_SUFFIX: amp-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Pin a fixed Blocks CLI telemetry installation ID for CI e2e runs so this
      # traffic is consistent and identifiable (and can be excluded from product
      # usage metrics).
      - uses: ./.github/actions/seed-telemetry-id

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Deploy sandbox
        run: |
          cd test-apps/amplify-gen2
          npm run sandbox:once -- --identifier amp-${GITHUB_RUN_ID:(-8)}

      - name: Run Playwright tests
        run: |
          cd test-apps/amplify-gen2
          npm run test:e2e

      - name: Cleanup sandbox
        if: always()
        run: |
          cd test-apps/amplify-gen2
          npm run sandbox:delete -- --identifier amp-${GITHUB_RUN_ID:(-8)} || true

  # Aggregate gate so this can be a single required status check in branch
  # protection. It always runs (even when the e2e jobs are skipped for
  # unrelated PRs or forks) and only fails if a job that actually ran failed.
  e2e-amplify-interop-required:
    name: E2E Amplify Interop (Required)
    if: always()
    needs: [e2e-amplify-interop-smoke, e2e-amplify-interop]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          smoke='${{ needs.e2e-amplify-interop-smoke.result }}'
          browser='${{ needs.e2e-amplify-interop.result }}'
          echo "smoke=$smoke browser=$browser"
          for result in "$smoke" "$browser"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "An Amplify interop job failed."
              exit 1
            fi
          done
          echo "Amplify interop checks passed (or were skipped)."
