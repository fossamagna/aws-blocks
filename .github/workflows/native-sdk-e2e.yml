name: Native SDK E2E

# Mirrors the web E2E pattern (see e2e-amplify-interop.yml): trigger on all PRs,
# detect whether native SDK / test-backend source changed, run the local suite
# always-when-relevant, deploy a per-run sandbox to the shared repo account for
# the sandbox suite (same-repo PRs + manual dispatch only), and expose a single
# always-running required gate so unrelated/fork PRs don't block branch protection.

on:
  pull_request:
    branches: ['*']
  workflow_dispatch:

concurrency:
  group: native-e2e-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      source-changed: ${{ steps.check.outputs.source-changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "source-changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only origin/main...HEAD | grep -qE '^(native/(dart|kotlin|swift)|test-apps/native-bindings)/|^\.github/workflows/native-sdk-e2e\.yml$'; then
            echo "source-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "source-changed=false" >> "$GITHUB_OUTPUT"
          fi

  # Shared setup: build monorepo, generate spec, upload artifact
  setup:
    name: Build & Generate Spec
    needs: [detect-changes]
    if: needs.detect-changes.outputs.source-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      spec-path: ${{ steps.spec.outputs.path }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Generate OpenRPC spec
        id: spec
        working-directory: test-apps/native-bindings
        run: |
          npm run spec
          echo "path=test-apps/native-bindings/aws-blocks/blocks.spec.json" >> $GITHUB_OUTPUT

      - name: Upload spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: blocks-spec
          path: test-apps/native-bindings/aws-blocks/blocks.spec.json
          retention-days: 1

  # Dart E2E (local server) — no AWS, so it runs on fork PRs too
  dart-e2e:
    name: Dart E2E
    needs: [detect-changes, setup]
    if: needs.detect-changes.outputs.source-changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.11.0'

      - run: npm ci
      - run: npm run build

      - name: Download spec
        uses: actions/download-artifact@v4
        with:
          name: blocks-spec
          path: test-apps/native-bindings/aws-blocks/

      - name: Pick a free port for the local server
        run: |
          # Pick a free port so the local server never collides on the runner.
          # python3 bind-to-0 is portable (the ubuntu runner ships python3);
          # fall back to 3001 if it fails. Thread the value to later steps via
          # $GITHUB_ENV so the server (reads PORT) and the suite (reads
          # BLOCKS_URL) agree on it without a hardcoded literal.
          PORT="$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1",0)); print(s.getsockname()[1]); s.close()' 2>/dev/null || echo 3001)"
          echo "PORT=${PORT}" >> "$GITHUB_ENV"
          echo "BLOCKS_URL=http://localhost:${PORT}/aws-blocks/api" >> "$GITHUB_ENV"
          echo "Picked local server port ${PORT}"

      - name: Start native-bindings server
        working-directory: test-apps/native-bindings
        run: |
          # Inherits PORT from $GITHUB_ENV; server.ts honors it (3001 fallback).
          npx tsx aws-blocks/scripts/server.ts &
          for i in $(seq 1 30); do
            curl -s -X POST "$BLOCKS_URL" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"api.kvGet","params":{"key":"healthcheck"},"id":1}' && break
            sleep 1
          done

      - name: Run Dart codegen
        working-directory: native/dart/packages/blocks_codegen
        run: |
          # blocks_codegen resolves blocks_runtime via a gitignored
          # pubspec_overrides.yaml in local dev; recreate it so `dart pub get`
          # finds the sibling package in CI (blocks_runtime isn't on pub.dev).
          printf 'dependency_overrides:\n  blocks_runtime:\n    path: ../blocks_runtime\n' > pubspec_overrides.yaml
          dart pub get
          dart run bin/blocks_codegen.dart \
            --spec ../../../../test-apps/native-bindings/aws-blocks/blocks.spec.json \
            --output ../../example/lib/blocks_client.dart

      - name: Verify generated client compiles
        working-directory: native/dart/example
        run: |
          # Recreate the gitignored path overrides so the example resolves the
          # in-repo runtime/codegen, and blocks_codegen's hosted blocks_runtime
          # dep unifies with the path version.
          printf 'dependency_overrides:\n  blocks_runtime:\n    path: ../packages/blocks_runtime\n  blocks_codegen:\n    path: ../packages/blocks_codegen\n' > pubspec_overrides.yaml
          dart pub get
          dart analyze lib/blocks_client.dart

      - name: Run E2E tests
        working-directory: native/dart/example
        # BLOCKS_URL is provided via $GITHUB_ENV from the "Pick a free port" step.
        run: dart run bin/e2e_test.dart

  # Kotlin E2E (TODO: add when ready)
  # kotlin-e2e:
  #   name: Kotlin E2E
  #   needs: [detect-changes, setup]
  #   if: needs.detect-changes.outputs.source-changed == 'true'
  #   ...

  swift-e2e:
    name: Swift E2E
    needs: [detect-changes, setup]
    if: needs.detect-changes.outputs.source-changed == 'true'
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Download spec
        uses: actions/download-artifact@v4
        with:
          name: blocks-spec
          path: test-apps/native-bindings/aws-blocks/

      - name: Pick a free port for the local server
        run: |
          # Pick a free port so the local server never collides on the runner.
          # python3 bind-to-0 is portable (the macOS runner ships python3);
          # fall back to 3001 if it fails. Thread the value to later steps via
          # $GITHUB_ENV so the server (reads PORT) and the suite (reads
          # BLOCKS_URL) agree on it without a hardcoded literal.
          PORT="$(python3 -c 'import socket; s=socket.socket(); s.bind(("127.0.0.1",0)); print(s.getsockname()[1]); s.close()' 2>/dev/null || echo 3001)"
          echo "PORT=${PORT}" >> "$GITHUB_ENV"
          echo "BLOCKS_URL=http://localhost:${PORT}/aws-blocks/api" >> "$GITHUB_ENV"
          echo "Picked local server port ${PORT}"

      - name: Run Swift codegen
        working-directory: native/swift
        run: |
          swift run swift-code-generator \
            ../../test-apps/native-bindings/aws-blocks/blocks.spec.json \
            Tests/BlocksE2ETests/Generated

      - name: Start native-bindings server
        working-directory: test-apps/native-bindings
        run: |
          # Inherits PORT from $GITHUB_ENV; server.ts honors it (3001 fallback).
          npx tsx aws-blocks/scripts/server.ts &
          for i in $(seq 1 30); do
            curl -s -X POST "$BLOCKS_URL" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"api.kvGet","params":["healthcheck"],"id":1}' && break
            sleep 1
          done

      - name: Verify server is ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf -X POST "$BLOCKS_URL" \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"api.kvGet","params":["healthcheck"],"id":1}' > /dev/null 2>&1; then
              echo "✅ Server ready"
              exit 0
            fi
            echo "⏳ attempt $i/30: server not ready; retrying in 2s..."
            sleep 2
          done
          echo "❌ Server never became ready"
          exit 1

      - name: Run E2E tests
        # BLOCKS_URL is provided via $GITHUB_ENV from the "Pick a free port" step.
        run: |
          xcodebuild clean test \
            -project native/swift/Tests/BlocksE2ETests/BlocksE2ETestApp.xcodeproj \
            -scheme BlocksE2ETests \
            -destination 'platform=iOS Simulator,name=iPhone 16'

  # Sandbox E2E — deploys a per-run stack to the shared repo AWS account.
  # Runs on same-repo PRs (fork PRs can't access secrets/OIDC) and on manual
  # dispatch. Deploy uses `npm run deploy` (aws-blocks/scripts/deploy.ts ->
  # aws-blocks/index.cdk.ts); the API serves JSON-RPC under `/aws-blocks/api`.
  dart-e2e-sandbox:
    name: Dart E2E (sandbox)
    needs: [detect-changes, dart-e2e]
    if: >-
      needs.detect-changes.outputs.source-changed == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    # Deploy sandbox alone is ~21 min (sequential DynamoDB GSI custom-resource
    # backfill), plus npm ci (~2m) + build (~4m) ≈ 27 min before any test runs.
    # 30 left too little headroom (test squeaked in but the job tripped the
    # wall / Destroy could be skipped → leaked stacks). Stop-gap until
    # deploy-once-per-run lands.
    timeout-minutes: 45
    environment: publish
    env:
      BLOCKS_STACK_SUFFIX: native-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.11.0'

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy sandbox
        working-directory: test-apps/native-bindings
        run: npm run deploy

      - name: Seed Cognito returning-customer test user
        working-directory: test-apps/native-bindings
        # Real Cognito emails the confirmation code, so the sign-up→code→confirm
        # leg can't be verified in CI (auth_cognito_test.dart skips it against a
        # deployed pool). Instead, admin-provision a confirmed user so the suite
        # can exercise the real returning-customer sign-in path. AWS_REGION +
        # BLOCKS_STACK_SUFFIX are inherited from the job/credentials step.
        run: npm run seed:cognito

      - name: Resolve BLOCKS_URL
        id: url
        working-directory: test-apps/native-bindings
        run: |
          URL=$(python3 -c "import json; print(json.load(open('.blocks-sandbox/config.json'))['apiUrl'])")
          # apiUrl is already the full JSON-RPC endpoint (…/prod/aws-blocks/api),
          # so emit it as-is. (Appending /aws-blocks/api here previously doubled
          # the path: the non-OIDC suites still worked because API Gateway routes
          # /prod/aws-blocks/api/* to the JSON-RPC Lambda, but the OIDC suite
          # derived a wrong origin and misrouted its /auth/* relay request.)
          echo "blocks_url=${URL}" >> $GITHUB_OUTPUT

      - name: Warm up sandbox API (post-deploy readiness gate)
        env:
          BLOCKS_URL: ${{ steps.url.outputs.blocks_url }}
        run: |
          # A freshly-deployed per-run stack's Lambda/API Gateway can cold-start:
          # the very first request against a brand-new sandbox intermittently
          # fails before the function is warm. That is what made the OIDC suite's
          # first raw `POST /authorize-params` (assertion A1) flaky in CI while it
          # passed 5/5 against already-warm sandboxes. Poll the JSON-RPC endpoint
          # until it answers HTTP 200 (it returns 200 with a JSON-RPC error body
          # for any payload, which proves the Lambda is up and serving) BEFORE
          # running the suite, so no suite eats the cold-start on its first call.
          # This hits the same Lambda that serves the /auth/* OIDC routes, so it
          # protects the OIDC suite's first request too. Bounded backoff; fails
          # loudly if the API never becomes ready.
          attempts=24
          delay=2
          for i in $(seq 1 "$attempts"); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
              -X POST -H 'content-type: application/json' -d '{}' \
              "$BLOCKS_URL" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then
              echo "✅ Sandbox API warm after $i attempt(s) (http=200)."
              exit 0
            fi
            echo "⏳ attempt $i/$attempts: API not ready (http=$code); retrying in ${delay}s..."
            sleep "$delay"
            if [ "$delay" -lt 10 ]; then delay=$((delay + 2)); fi
          done
          echo "❌ Sandbox API did not return HTTP 200 after $attempts attempts."
          exit 1

      - name: Generate OpenRPC spec
        working-directory: test-apps/native-bindings
        run: npm run spec

      - name: Run Dart codegen
        working-directory: native/dart/packages/blocks_codegen
        run: |
          # blocks_codegen resolves blocks_runtime via a gitignored
          # pubspec_overrides.yaml in local dev; recreate it so `dart pub get`
          # finds the sibling package in CI (blocks_runtime isn't on pub.dev).
          printf 'dependency_overrides:\n  blocks_runtime:\n    path: ../blocks_runtime\n' > pubspec_overrides.yaml
          dart pub get
          dart run bin/blocks_codegen.dart \
            --spec ../../../../test-apps/native-bindings/aws-blocks/blocks.spec.json \
            --output ../../example/lib/blocks_client.dart

      - name: Run Dart E2E against sandbox
        working-directory: native/dart/example
        env:
          BLOCKS_URL: ${{ steps.url.outputs.blocks_url }}
          # The sandbox is HTTPS, so the OIDC relay suite can run here (the
          # local-server job above cannot — the stub IdP rejects http
          # redirect_uris). The server-relay OidcClient landed in #867 (now on
          # main), so oidc_test.dart compiles.
          RUN_OIDC: '1'
        run: |
          printf 'dependency_overrides:\n  blocks_runtime:\n    path: ../packages/blocks_runtime\n  blocks_codegen:\n    path: ../packages/blocks_codegen\n' > pubspec_overrides.yaml
          dart pub get
          dart run bin/e2e_test.dart

      - name: Destroy sandbox
        if: always()
        working-directory: test-apps/native-bindings
        run: npm run destroy || true

  swift-e2e-sandbox:
    name: Swift E2E (sandbox)
    needs: [detect-changes, swift-e2e]
    if: >-
      needs.detect-changes.outputs.source-changed == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: macos-15
    # Same ~27-min deploy+build overhead as dart-e2e-sandbox; the slower
    # xcodebuild blew past 30 (and skipped Destroy → leaked stack). Raise to 45.
    # Stop-gap until deploy-once-per-run lands.
    timeout-minutes: 45
    environment: publish
    env:
      BLOCKS_STACK_SUFFIX: native-swift-${{ github.event.pull_request.number || github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy sandbox
        working-directory: test-apps/native-bindings
        run: npm run deploy

      - name: Resolve BLOCKS_URL
        id: url
        working-directory: test-apps/native-bindings
        run: |
          URL=$(python3 -c "import json; print(json.load(open('.blocks-sandbox/config.json'))['apiUrl'])")
          echo "blocks_url=${URL}/aws-blocks/api" >> $GITHUB_OUTPUT

      - name: Generate OpenRPC spec
        working-directory: test-apps/native-bindings
        run: npm run spec

      - name: Run Swift codegen
        working-directory: native/swift
        run: |
          swift run swift-code-generator \
            ../../test-apps/native-bindings/aws-blocks/blocks.spec.json \
            Tests/BlocksE2ETests/Generated

      - name: Warm up sandbox API
        env:
          BLOCKS_URL: ${{ steps.url.outputs.blocks_url }}
        run: |
          attempts=24
          delay=2
          for i in $(seq 1 "$attempts"); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
              -X POST -H 'content-type: application/json' -d '{}' \
              "$BLOCKS_URL" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then
              echo "✅ Sandbox API warm after $i attempt(s) (http=200)."
              exit 0
            fi
            echo "⏳ attempt $i/$attempts: API not ready (http=$code); retrying in ${delay}s..."
            sleep "$delay"
            if [ "$delay" -lt 10 ]; then delay=$((delay + 2)); fi
          done
          echo "❌ Sandbox API did not return HTTP 200 after $attempts attempts."
          exit 1

      - name: Run Swift E2E against sandbox
        env:
          BLOCKS_URL: ${{ steps.url.outputs.blocks_url }}
          RUN_OIDC: '1'
        run: |
          xcodebuild test \
            -project native/swift/Tests/BlocksE2ETests/BlocksE2ETestApp.xcodeproj \
            -scheme BlocksE2ETests \
            -destination 'platform=iOS Simulator,name=iPhone 16'

      - name: Destroy sandbox
        if: always()
        working-directory: test-apps/native-bindings
        run: npm run destroy || true

  # Aggregate gate so this can be a single required status check in branch
  # protection. Always runs (even when the e2e jobs are skipped for unrelated
  # or fork PRs) and only fails if a job that actually ran failed.
  native-sdk-e2e-required:
    name: Native SDK E2E (Required)
    if: always()
    needs: [detect-changes, setup, dart-e2e, swift-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "detect-changes=${{ needs.detect-changes.result }} setup=${{ needs.setup.result }} dart-e2e=${{ needs.dart-e2e.result }} swift-e2e=${{ needs.swift-e2e.result }}"
          # Required gate = SDK correctness: detect-changes + setup + the local
          # dart-e2e suite (no AWS). The deploying `dart-e2e-sandbox` job still
          # runs as a NON-BLOCKING signal — it depends on deployed-backend config
          # that isn't part of the SDK (real-Cognito email code delivery, which a
          # dev-only `cognitoGetLastCode` hook can't satisfy; and fresh-deploy
          # OIDC state). The OIDC relay suite was verified 5/5 against a live
          # sandbox, so this is environment, not SDK. Re-add `dart-e2e-sandbox`
          # to this gate once the deployed Cognito sign-in path is testable.
          # Skipped jobs (no source changes) are treated as passing.
          for result in \
            "${{ needs.detect-changes.result }}" \
            "${{ needs.setup.result }}" \
            "${{ needs.dart-e2e.result }}" \
            "${{ needs.swift-e2e.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required native SDK E2E job failed (or was cancelled)."
              exit 1
            fi
          done
          echo "Native SDK E2E (required) checks passed (or were skipped)."
